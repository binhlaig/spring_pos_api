server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/posdb
    username: posuser
    password: pospass

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: debug

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32+CHARS"
    expiresMinutes: 1440
  upload:
    dir: ./uploads


