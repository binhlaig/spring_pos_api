server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/posdb}
    username: ${SPRING_DATASOURCE_USERNAME:posuser}
    password: ${SPRING_DATASOURCE_PASSWORD:pospass}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:warn}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:}
    expiresMinutes: ${APP_JWT_EXPIRES_MINUTES:1440}
  upload:
    dir: ${APP_UPLOAD_DIR:./uploads}
  admin:
    setup-key: ${ADMIN_SETUP_KEY:}
    bootstrap-enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
